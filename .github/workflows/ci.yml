name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Validate case.json files
        run: npx tsx scripts/validate-cases.ts

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Run tests
        run: npx vitest run
